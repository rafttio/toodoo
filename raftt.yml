build:
  dockerComposeFile: ./docker-compose.yml
  workdir: ./
host: admiral.rafttdev.raftt.io
devContainer: dev/dev-compose.yml
envDefinition: raftt.star
data:
  - service: db
    type: postgres
    user: postgres
    dump: dev/dump.sql
debugging:
  - service: web
    language: python
secrets:
  secret-volume:
    inputcommand: cat secret-mount
    outputvolume: true
  env-secret:
    inputcommand: cat secret-env
    outputenv: DUMMY_ENV_SECRET
  aws-credentials:
    inputcommand: cat ~/.aws/credentials
    outputvolume: true